<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .campaign-card {
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .campaign-card:hover {
            background-color: #180b39;
        }
        .campaign-details {
            display: none;
            margin-top: 20px;
        }
        .lead-list {
            list-style-type: none;
            padding: 0;
        }
        .lead-item {
            background-color: #2a2a2a;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .lead-item.gold {
            background-color: #3a3a2a;
            border: 1px solid #ffd700;
        }
        .lead-item.five-star {
            background-color: #4a4a1a;
            border: 2px solid #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .lead-info {
            flex: 1;
            min-width: 200px;
        }
        .lead-rating-overview {
            text-align: right;
            min-width: 200px;
        }
        .lead-rating {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        .lead-overview {
            font-size: 0.9em;
            color: #aaa;
        }
        .lead-client-info {
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>Campaign Analytics</h1>
    
    <div id="campaigns-container"></div>

    <script>
        async function fetchCampaignData() {
            try {
                const response = await fetch('https://ai-automated-outreach-5c4ade0e7f79.herokuapp.com/api/campaigns');
                if (!response.ok) {
                    throw new Error('Failed to fetch campaign data');
                }
                const campaigns = await response.json();

                return campaigns.map(campaign => ({
                    id: campaign._id,
                    name: campaign.name,
                    avgCallTime: "", // Leave blank for now
                    successRate: "", // Leave blank for now
                    leads: campaign.phoneNumbers ? campaign.phoneNumbers.length : 0,
                    contacts: campaign.customers ? campaign.customers.map(customer => ({
                        name: "Unknown", // Assuming name is not stored currently
                        email: customer.email || "",
                        phone: customer.phoneNumber,
                        rating: customer.ranking,
                        callOverview: customer.callSummary,
                        clientInfo: customer.extraInfo,
                        time: customer.duration
                    })) : []
                }));
            } catch (error) {
                console.error('Error fetching campaign data:', error);
                return []; // Return an empty array if there's an error
            }
        }

        function createCampaignCard(campaign) {
            // Calculate success metrics

            console.log('Contact durations:', campaign.contacts.map(contact => contact.time));
            
            // Calculate success metrics
            const totalCustomers = campaign.contacts.length;
            const highRankedCustomers = campaign.contacts.filter(contact => contact.rating >= 3).length;
            const successRate = totalCustomers > 0 
                ? Math.round((highRankedCustomers / totalCustomers) * 100) 
                : 0;

            // Calculate average call duration from contacts array
            const avgCallDuration = campaign.contacts && campaign.contacts.length > 0
                ? Math.round(
                    campaign.contacts.reduce((sum, contact) => sum + (contact.time || 0), 0) 
                    / campaign.contacts.length
                  )
                : 0;

            // Convert seconds to minutes and seconds format
            const minutes = Math.floor(avgCallDuration / 60);
            const seconds = avgCallDuration % 60;
            const formattedDuration = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            const card = document.createElement('div');
            card.className = 'card campaign-card';
            card.innerHTML = `
                <h2>${campaign.name}</h2>
                <p>Average Call Time: ${formattedDuration}</p>
                <p>Success Rate: ${successRate}%</p>
                <p>Number of Leads: ${highRankedCustomers}</p>
            `;

            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'campaign-details';

            // Sort contacts by rating (descending order)
            const sortedContacts = [...campaign.contacts].sort((a, b) => b.rating - a.rating);

            detailsDiv.innerHTML = `
                <h3>Contacts</h3>
                <ul class="lead-list">
                    ${sortedContacts.map(contact => `
                        <li class="lead-item ${contact.rating >= 3 ? 'gold' : ''} ${contact.rating === 5 ? 'five-star' : ''}">
                            <div class="lead-info">
                                <p><strong>${contact.name}</strong></p>
                                <p>${contact.email} | ${contact.phone}</p>
                            </div>
                            <div class="lead-rating-overview">
                                <div class="lead-rating">
                                    ${'★'.repeat(contact.rating)}${'☆'.repeat(5-contact.rating)}
                                </div>
                                <div class="lead-overview">
                                    <strong>Call Overview:</strong> ${contact.callOverview}
                                </div>
                                <div class="lead-client-info">
                                    <strong>Client Info:</strong> ${contact.clientInfo}
                                </div>
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;

            card.addEventListener('click', () => {
                detailsDiv.style.display = detailsDiv.style.display === 'none' ? 'block' : 'none';
            });

            card.appendChild(detailsDiv);
            return card;
        }

        async function renderCampaigns() {
            const container = document.getElementById('campaigns-container');
            console.log('Fetching campaign data...');
            const campaigns = await fetchCampaignData();
            console.log('Campaigns data:', campaigns);
            campaigns.forEach(campaign => {
                console.log('Rendering campaign:', campaign.name);
                container.appendChild(createCampaignCard(campaign));
            });
        }

        renderCampaigns();
    </script>
</body>
</html>
